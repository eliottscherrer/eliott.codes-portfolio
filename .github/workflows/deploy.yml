name: Deploy portfolio to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Verify export output exists
        run: |
          test -f out/index.html || test -f out/fr/index.html || test -f out/en/index.html

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /var/www/eliott.codes-portfolio/out"

      - name: Deploy exported site
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            out/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/eliott.codes-portfolio/out/"

      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo nginx -t && sudo systemctl reload nginx"
