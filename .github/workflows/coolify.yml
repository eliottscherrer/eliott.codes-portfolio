name: CI and Deploy to Coolify

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: portfolio-main
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy_coolify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Coolify Deploy
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          test -n "$COOLIFY_DEPLOY_WEBHOOK" && test -n "$COOLIFY_API_KEY"
          curl --retry 5 --retry-delay 2 --retry-connrefused -fsS -X POST \
            "$COOLIFY_DEPLOY_WEBHOOK" \
            -H "Authorization: Bearer $COOLIFY_API_KEY"