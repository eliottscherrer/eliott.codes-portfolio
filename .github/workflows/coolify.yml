name: CI and Deploy to Coolify

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: portfolio-main
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, portfolio-deploy]
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy_coolify:
    needs: ci
    runs-on: [self-hosted, portfolio-deploy]
    timeout-minutes: 5
    steps:
      - name: Validate required secret
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          test -n "$COOLIFY_DEPLOY_WEBHOOK"

      - name: Trigger Coolify Deploy
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          if [ -n "$COOLIFY_API_KEY" ]; then
            curl --retry 5 --retry-delay 2 --retry-connrefused -fsS -X POST \
              "$COOLIFY_DEPLOY_WEBHOOK" \
              -H "Authorization: Bearer $COOLIFY_API_KEY"
          else
            curl --retry 5 --retry-delay 2 --retry-connrefused -fsS -X POST \
              "$COOLIFY_DEPLOY_WEBHOOK"
          fi