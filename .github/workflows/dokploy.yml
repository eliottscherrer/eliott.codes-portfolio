name: CI and Deploy to Dokploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: portfolio-main
  cancel-in-progress: true

jobs:
  ci:
    runs-on: [self-hosted, portfolio-deploy]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy_dokploy:
    needs: ci
    runs-on: [self-hosted, portfolio-deploy]
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Validate Dokploy secrets
        env:
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
        run: |
          test -n "$DOKPLOY_API_KEY"
          test -n "$DOKPLOY_APPLICATION_ID"
          test -n "$DOKPLOY_URL"

      - name: Trigger Dokploy deployment
        uses: benbristow/dokploy-deploy-action@0.2.2
        with:
          api_token: ${{ secrets.DOKPLOY_API_KEY }}
          application_id: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          service_type: application
